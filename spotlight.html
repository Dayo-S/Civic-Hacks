<!DOCTYPE html>
<html>
<head>
    <title>Brookline Infrastructure Map</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="spotlight-card" class="glass-card">
  <div class="card-header">
    <span class="icon">📍</span>
    <h3>Infrastructure Spotlight</h3>
  </div>
  
  <div id="card-content">
    <p class="instruction-text">Click a street on the map to see the latest stats and news.</p>
    
    <div id="stats-section" class="hidden">
      <div class="stat-badge">
        <span id="pci-label">Condition: --</span>
        <strong id="pci-score">Score: --</strong>
      </div>
      <p id="ai-narrative">Loading the expert report...</p>
    </div>
  </div>
  
  <div class="news-footer">
    <small>Live Data Feed: 2026 Brookline Plan</small>
  </div>
</div>
    <script src="pavement_data.js"></script>
    <script src="spotlight.js"></script>
</body>
</html>
